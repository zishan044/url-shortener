services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy # Wait for the health check to pass
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
  postgres:
    image: postgres:18.3-alpine3.23
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: zishan044
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zishan044 -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8.4-alpine3.22
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5