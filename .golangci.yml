run:
  timeout: 5m
  deadline: 5m
  tests: true
  build-tags: []
  skip-dirs: []
  skip-files: []

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-source: false

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    
  govet:
    check-shadowing: true
    use-builtin-rules: true
    
  gofmt:
    simplify: true
    
  goimports:
    local-prefixes: github.com/zishan044/url-shortener
    
  golint:
    min-confidence: 0.8
    
  gosimple:
    go: "1.26"
    
  staticcheck:
    go: "1.26"
    
  stylecheck:
    go: "1.26"
    
  cyclop:
    max-complexity: 10
    skip-tests: true
    
  dupl:
    threshold: 150
    
  goconst:
    min-len: 3
    min-occurrences: 3
    
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
    disabled-checks:
      - commentedOutCode

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - typecheck
    - varcheck
    - deadcode
    - gofmt
    - goimports
    - golint
    - goconst
    - gocritic
    - maligned
    - misspell
    - vet
  
  fast: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
    - linters:
        - staticcheck
      text: "SA9003"
    - linters:
        - lll
      source: "^//go:generate"

severity:
  default-severity: error
  rules:
    - linters:
        - dupl
      severity: warning
    - linters:
        - gosec
      severity: warning
